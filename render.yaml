services:
  - type: web
    name: holdmaintenance-api
    runtime: dotnet
    rootDir: backend
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/HoldMaintenance.Api.dll
    region: singapore
    plan: free
    envVars:
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
